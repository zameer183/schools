<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "on-surface": "#191c1d",
                    "tertiary": "#214346",
                    "inverse-primary": "#93d1d5",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#c5e9ec",
                    "tertiary-fixed-dim": "#a9cdd0",
                    "secondary-container": "#fdb24f",
                    "on-background": "#191c1d",
                    "secondary-fixed": "#ffddb8",
                    "on-secondary-fixed-variant": "#653e00",
                    "surface-container-low": "#f3f4f5",
                    "on-tertiary-fixed": "#002022",
                    "secondary-fixed-dim": "#ffb960",
                    "on-tertiary-fixed-variant": "#2a4c4f",
                    "error-container": "#ffdad6",
                    "surface-tint": "#27676b",
                    "surface-container": "#edeeef",
                    "tertiary-container": "#395b5e",
                    "primary-fixed-dim": "#93d1d5",
                    "outline-variant": "#bfc8c9",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary-container": "#add1d5",
                    "surface": "#f8f9fa",
                    "on-primary-fixed-variant": "#004f53",
                    "on-error-container": "#93000a",
                    "on-primary-container": "#97d5d9",
                    "on-secondary-container": "#704500",
                    "outline": "#6f7979",
                    "primary": "#004649",
                    "surface-bright": "#f8f9fa",
                    "on-secondary-fixed": "#2a1700",
                    "surface-variant": "#e1e3e4",
                    "primary-container": "#1b5e62",
                    "on-primary-fixed": "#002022",
                    "secondary": "#865300",
                    "background": "#f8f9fa",
                    "surface-container-high": "#e7e8e9",
                    "on-error": "#ffffff",
                    "surface-dim": "#d9dadb",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#afedf2",
                    "on-surface-variant": "#3f4849",
                    "inverse-surface": "#2e3132",
                    "surface-container-highest": "#e1e3e4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9fa;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface antialiased">
<!-- The navigation shells are suppressed as per the "Destination Rule" for focused/transactional flows like Forgot Password -->
<main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Editorial Background Elements -->
<div class="absolute top-[-10%] right-[-5%] w-[40rem] h-[40rem] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30rem] h-[30rem] bg-secondary/5 rounded-full blur-3xl"></div>
<div class="w-full max-w-xl relative z-10">
<!-- Branding Header -->
<div class="text-center mb-12">
<h1 class="font-headline font-black uppercase tracking-[0.15em] text-primary text-2xl mb-2">Scholarly</h1>
<div class="h-1 w-12 bg-secondary mx-auto rounded-full"></div>
</div>
<!-- Content Card -->
<div class="bg-surface-container-lowest p-10 md:p-14 rounded-[2.5rem] shadow-[0_12px_40px_rgba(0,70,73,0.06)] relative overflow-hidden">
<!-- Hero Image Area (Asymmetric Layout) -->
<div class="flex flex-col md:flex-row gap-10 items-center mb-10">
<div class="w-full md:w-1/2">
<h2 class="font-headline text-3xl font-extrabold text-primary leading-tight mb-4">
                            Account Recovery
                        </h2>
<p class="text-on-surface-variant leading-relaxed font-medium">
                            Enter the institutional email associated with your profile. We will dispatch a secure reset link to your inbox.
                        </p>
</div>
<div class="w-full md:w-1/2">
<div class="aspect-square w-full rounded-2xl bg-surface-container overflow-hidden">
<img class="w-full h-full object-cover grayscale opacity-80 mix-blend-multiply" data-alt="Close-up of an open classic book on a minimalist wooden desk with soft cinematic morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDy_HeztZj8bUb9rjVZdTK6o5IN32X0mcV-pN-J4PU77IN7yR737z0WmOe5DeXwsSFZeoTS9wge6IXpjWATTHGJ4GqZOeYUMsE5i5UhhzFRfTU7yfTnxzErAxcUp5DZhTd3YZSpxPdQNikxJytKz6EvBSQ8f1G-K8c5k1iQZ8DEHF8JN_sEy_uChG2IBYK4FnsDyZFZfmo0Yl_VSUJNSE9CtE3HpWMl5xhEEwvvS9alLMEVkeyyl6RuBXzCjh7XI9JAGybrPlGobLQ"/>
</div>
</div>
</div>
<!-- Recovery Form -->
<form class="space-y-8">
<div class="relative">
<label class="block font-label text-[11px] font-bold uppercase tracking-widest text-primary mb-3 ml-1" for="email">
                            Email Address
                        </label>
<div class="flex items-center bg-surface-container-low rounded-xl px-4 py-1 group focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-outline mr-3">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-3 text-on-surface placeholder:text-outline font-medium" id="email" placeholder="name@university.edu" required="" type="email"/>
</div>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-xl font-headline font-bold text-lg shadow-[0_8px_20px_rgba(0,70,73,0.15)] hover:shadow-[0_10px_25px_rgba(0,70,73,0.25)] transition-all active:scale-[0.98]" type="submit">
                        Send Reset Link
                    </button>
</form>
<!-- Footer Actions -->
<div class="mt-12 pt-8 border-t border-outline-variant/20 text-center">
<a class="inline-flex items-center text-secondary font-headline font-bold hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined mr-2 text-sm">arrow_back</span>
                        Back to Login
                    </a>
</div>
</div>
<!-- Contextual Footer -->
<div class="mt-8 text-center">
<p class="text-[11px] font-label font-bold uppercase tracking-widest text-outline">
                    Secure Student Portal © 2024 Scholarly Editorial
                </p>
</div>
</div>
</main>
</body></html>
