<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary": "#284143",
                      "primary": "#124346",
                      "on-secondary-container": "#714200",
                      "primary-fixed": "#bcebef",
                      "surface-container": "#edeeee",
                      "on-tertiary-fixed": "#051f21",
                      "on-background": "#1a1c1c",
                      "surface-container-lowest": "#ffffff",
                      "surface-tint": "#396569",
                      "on-tertiary-fixed-variant": "#324b4d",
                      "error-container": "#ffdad6",
                      "on-primary-container": "#a2d0d4",
                      "error": "#ba1a1a",
                      "tertiary-container": "#3f585a",
                      "surface-container-highest": "#e2e3e2",
                      "inverse-on-surface": "#f0f1f0",
                      "surface": "#f9f9f9",
                      "secondary-container": "#fead51",
                      "tertiary-fixed-dim": "#b1cbce",
                      "secondary-fixed-dim": "#ffb86c",
                      "primary-container": "#2d5a5e",
                      "on-surface-variant": "#404849",
                      "surface-bright": "#f9f9f9",
                      "outline": "#707979",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed": "#002022",
                      "surface-container-high": "#e7e8e8",
                      "inverse-surface": "#2e3131",
                      "on-primary-fixed-variant": "#1f4d51",
                      "primary-fixed-dim": "#a1cfd3",
                      "on-tertiary-container": "#b2cdcf",
                      "on-secondary-fixed": "#2c1600",
                      "on-surface": "#1a1c1c",
                      "surface-variant": "#e2e3e2",
                      "secondary": "#895100",
                      "on-secondary-fixed-variant": "#683c00",
                      "secondary-fixed": "#ffdcbd",
                      "inverse-primary": "#a1cfd3",
                      "on-secondary": "#ffffff",
                      "on-primary": "#ffffff",
                      "surface-container-low": "#f3f4f3",
                      "on-error": "#ffffff",
                      "surface-dim": "#d9dada",
                      "outline-variant": "#c0c8c9",
                      "background": "#f9f9f9",
                      "tertiary-fixed": "#cce8ea",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .editorial-shadow {
            box-shadow: 0px 12px 32px rgba(26, 28, 28, 0.06);
        }
        .glass-header {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-neutral-50/80 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full max-w-full docked full-width top-0 sticky z-50 shadow-[0px_12px_32px_rgba(26,28,28,0.06)]">
<div class="flex items-center gap-4">
<button class="text-teal-900 hover:bg-neutral-200/50 transition-colors p-2 rounded-full scale-95 active:opacity-80">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Manrope'] font-bold text-2xl tracking-tight text-teal-900">Faculty Hub</h1>
</div>
<div class="flex items-center">
<button class="text-teal-900 font-bold text-sm px-4 py-2 hover:bg-neutral-200/50 rounded-xl transition-all">Save</button>
</div>
</header>
<main class="px-6 py-8 space-y-8">
<!-- Profile Photo Section -->
<section class="flex flex-col items-center justify-center">
<div class="relative group">
<div class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden editorial-shadow border-4 border-surface-container-lowest">
<img class="w-full h-full object-cover" data-alt="Close-up professional studio portrait of a teacher in a smart casual dark teal blazer, bright neutral background, soft editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKMXV2pTrVyy-qAC7bW-JOdADgWkOwxDwEmw5iqMX0ce64Pkbc_AUkJBiJVVL3z0vvjD4bP2HIauF0iKwU7JGlFW3cbI9_cAeT4WFeT7ZYCrBjAHY0wogYJ-BklwwRYl_hK9ftlX9QJQYuPHfUvrwvjp1MCGEcWXIssR9zCBO2QelmWnBq373pYszlUIIXbx2dkb8y1zD9wQXJsZZBYwk26yKX1NGJksKm6w96Ed0Frj30ICHbuWi56R90GShLwl16jbp-jh5iyCI"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center editorial-shadow transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<div class="mt-4 text-center">
<h2 class="font-headline font-bold text-xl text-primary">Edit Profile</h2>
<p class="text-sm text-outline font-medium">Update academic credentials</p>
</div>
</section>
<!-- Form Section -->
<section class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-semibold tracking-wide uppercase text-secondary">Full Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface editorial-shadow focus:ring-2 focus:ring-primary-fixed transition-all outline-none" placeholder="Enter full name" type="text" value="Dr. Sarah Al-Farsi"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
</div>
<!-- Employee Code -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-semibold tracking-wide uppercase text-secondary">Employee Code</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface editorial-shadow focus:ring-2 focus:ring-primary-fixed transition-all outline-none" placeholder="EMP-ID-000" type="text" value="MNH-FAC-2024-089"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
</div>
</div>
</div>
<!-- Two-Column Layout for Qualifications -->
<div class="grid grid-cols-1 gap-6">
<!-- Qualification -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-semibold tracking-wide uppercase text-secondary">Qualification</label>
<div class="relative group">
<select class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface editorial-shadow focus:ring-2 focus:ring-primary-fixed appearance-none transition-all outline-none">
<option>Ph.D. in Educational Leadership</option>
<option>Masters in Curriculum Design</option>
<option>Bachelor of Science</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">
<span class="material-symbols-outlined" data-icon="school">school</span>
</div>
</div>
</div>
<!-- Specialization -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-semibold tracking-wide uppercase text-secondary">Specialization</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface editorial-shadow focus:ring-2 focus:ring-primary-fixed transition-all outline-none" placeholder="Subject area" type="text" value="Advanced Pedagogy"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="psychology">psychology</span>
</div>
</div>
</div>
</div>
<!-- Additional Details Asymmetric Card -->
<div class="bg-primary-container p-6 rounded-xl text-on-primary-container editorial-shadow mt-8">
<div class="flex items-start justify-between mb-4">
<div>
<h3 class="font-headline font-bold text-lg">Academic Status</h3>
<p class="text-sm opacity-80">Current term assignments</p>
</div>
<span class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Active</span>
</div>
<div class="flex items-center gap-4 mt-6">
<div class="flex-1">
<div class="h-1 bg-primary/20 rounded-full w-full">
<div class="h-1 bg-primary-fixed rounded-full w-[75%]"></div>
</div>
<p class="text-[10px] mt-2 font-medium opacity-80 uppercase tracking-tighter">Profile Completion 75%</p>
</div>
<button class="bg-surface-container-lowest/10 p-2 rounded-full hover:bg-surface-container-lowest/20 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 backdrop-blur-md rounded-t-[2rem] shadow-[0_-8px_24px_rgba(0,0,0,0.04)] md:hidden">
<a class="flex flex-col items-center justify-center text-neutral-400" href="#">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase mt-1">Staff</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-400" href="#">
<span class="material-symbols-outlined" data-icon="construction">construction</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase mt-1">Tools</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-400" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase mt-1">Reports</span>
</a>
<a class="flex flex-col items-center justify-center bg-teal-100/50 text-teal-900 rounded-full px-5 py-1" href="#">
<span class="material-symbols-outlined" data-icon="account_circle" style="font-variation-settings: 'FILL' 1;">account_circle</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide uppercase mt-1">Profile</span>
</a>
</nav>
</body></html>
